services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: qa_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qa_ai
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: qa_redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: qa_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ./backend
    container_name: qa_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/qa_ai
    depends_on:
      - postgres
      - redis
      - ollama

  frontend:
    build: ./frontend
    container_name: qa_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  ollama_data:
